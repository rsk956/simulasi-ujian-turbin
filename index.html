<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akses Dibatasi - Masa Trial Berakhir</title>
  <!-- Menggunakan font Inter untuk tampilan yang sangat clean dan modern -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter',
              'sans-serif'],
          }
        }
      }
    }
    // KONTROL STATUS PERBAIKAN DI SINI
    // true  = Perbaikan ON (Tampilkan halaman ini)
    // false = Perbaikan OFF (Langsung buka halaman utama)
    const IS_MAINTENANCE = true;

    // Nama file halaman utama Anda di GitHub Pages
    const MAIN_PAGE_URL = 'boilerV1.html';

    if (!IS_MAINTENANCE) {
      window.location.replace(MAIN_PAGE_URL);
    }
  </script>
  <style>
    /* Mencegah kedipan konten sebelum redirect selesai */
    body {
      display: none;
    }
  </style>
  <style>
    /* Memastikan selalu 1 layar dan tidak bisa di-scroll */
    body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #FAFAFA;
      /* Abu-abu sangat muda/bersih */
    }
  </style>
</head>
<body class="text-gray-800 antialiased selection:bg-blue-100 selection:text-blue-900">

  <!-- Kontainer Utama -->
  <div class="w-full max-w-[420px] px-6">

    <!-- Kartu Putih -->
    <div class="bg-white rounded-[24px] p-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100/80 text-center">

      <!-- Ikon Minimalis -->
      <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
        </svg>
      </div>

      <!-- Teks Informasi -->
      <h1 class="text-[22px] font-semibold text-gray-900 tracking-tight mb-2">
        Masa Trial Berakhir
      </h1>
      <p class="text-sm text-gray-500 leading-relaxed mb-8">
        Waktu akses gratis Anda telah habis. Silakan lakukan aktivasi pembayaran untuk kembali menggunakan layanan web ini.
      </p>

      <!-- Kotak Pembayaran yang Clean -->
      <div class="bg-gray-50/50 rounded-2xl p-1.5 mb-8 border border-gray-100">
        <div class="bg-white rounded-xl p-4 flex items-center justify-between shadow-sm border border-gray-50">
          <div class="flex items-center gap-3">
            <span class="font-medium text-gray-800 text-[17px] tracking-wide" id="nomor-dana">
              0813 5647 1168
            </span>
          </div>

          <!-- Tombol Salin -->
          <button onclick="salinNomor()" id="btn-salin" class="text-xs font-medium text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors duration-200">
            Salin
          </button>
        </div>
      </div>

      <!-- Tombol Aksi -->
      <div class="flex flex-col gap-3">
        <a href="https://wa.me/6281356471168?text=Halo,%20saya%20ingin%20mengaktifkan%20kembali%20akses%20web%20saya.%20Saya%20sudah%20melakukan%20transfer%20ke%20DANA."
          target="_blank"
          class="w-full bg-gray-900 hover:bg-black text-white text-sm font-medium py-3.5 rounded-xl transition-all duration-200 shadow-md shadow-gray-900/10 flex items-center justify-center gap-2">
          Konfirmasi via WhatsApp
        </a>

        <button onclick="window.location.reload();" class="text-xs text-gray-400 hover:text-gray-600 font-medium py-2 transition-colors">
          Sudah aktivasi? Muat ulang halaman
        </button>
      </div>

    </div>

    <!-- Watermark/Footer sangat halus di luar kotak -->
    <div class="text-center mt-6">
      <span class="text-[11px] text-gray-400 font-medium">Akses Terkunci &copy; Sistem Keamanan Web</span>
    </div>
  </div>

  <!-- Script untuk fitur Copy Paste -->
  <script>
    function salinNomor() {
      // Mengambil teks nomor tanpa spasi
      const nomor = "081356471168";

      // Membuat elemen textarea sementara untuk proses copy
      const tempInput = document.createElement("input");
      tempInput.value = nomor;
      document.body.appendChild(tempInput);
      tempInput.select();
      document.execCommand("copy");
      document.body.removeChild(tempInput);

      // Mengubah teks tombol sebagai indikator sukses
      const btn = document.getElementById('btn-salin');
      const teksAsli = btn.innerText;

      btn.innerText = "Tersalin!";
      btn.classList.replace("text-blue-600", "text-emerald-600");
      btn.classList.replace("bg-blue-50", "bg-emerald-50");
      btn.classList.replace("hover:bg-blue-100", "hover:bg-emerald-100");

      // Mengembalikan ke teks semula setelah 2 detik
      setTimeout(() => {
        btn.innerText = teksAsli;
        btn.classList.replace("text-emerald-600", "text-blue-600");
        btn.classList.replace("bg-emerald-50", "bg-blue-50");
        btn.classList.replace("hover:bg-emerald-100", "hover:bg-blue-100");
      }, 2000);
    }

    // Tampilkan halaman hanya jika memang sedang maintenance
    if (IS_MAINTENANCE) {
      document.body.style.display = 'flex';
    }
  </script>
</body>
</html>
